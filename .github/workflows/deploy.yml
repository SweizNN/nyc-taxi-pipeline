name: Build, Push & Deploy to Kubernetes

on:
  push:
    branches:
      - main

# IMAGE_REGISTRY: GitHub Container Registry (GHCR) kullanılıyor.
# Değiştirmek istersen Docker Hub için: docker.io/KULLANICI_ADIN

env:
  IMAGE_REGISTRY: ghcr.io/sweiznn

jobs:
  # ─────────────────────────────────────────────────────────
  # AŞAMA 1: Docker imajlarını build et ve GHCR'ye push et
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Çıktı olarak tam imaj tag'ini sonraki job'a aktarıyoruz
    outputs:
      registry: ${{ env.IMAGE_REGISTRY }}


    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ DÜZELTME: Docker Hub yerine GHCR'ye login (GITHUB_TOKEN ile, secret gerekmez)
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Buildx: çok platform desteği + layer cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Spark imajı (Bronze/Silver/Gold/Training job'ları kullanır) ---
      - name: Build and push Spark image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./spark_jobs/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-spark:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Producer imajı ---
      - name: Build and push Producer image
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-producer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- MLflow imajı ---
      - name: Build and push MLflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ml_pipeline/Dockerfile.mlflow
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-mlflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Dashboard imajı ---
      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ml_pipeline/Dockerfile.dashboard
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Özet ──────────────────────────────────────────────
      - name: Summary
        run: |
          echo "✅ Tüm imajlar GHCR'ye push edildi:"
          echo "   ${{ env.IMAGE_REGISTRY }}/nyc-taxi-spark:latest"
          echo "   ${{ env.IMAGE_REGISTRY }}/nyc-taxi-producer:latest"
          echo "   ${{ env.IMAGE_REGISTRY }}/nyc-taxi-mlflow:latest"
          echo "   ${{ env.IMAGE_REGISTRY }}/nyc-taxi-dashboard:latest"
          echo ""
          echo "Deploy için terminalde çalıştır:"
          echo "  kubectl apply -f ml_pipeline/"
