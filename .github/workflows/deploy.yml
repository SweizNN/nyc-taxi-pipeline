name: Build, Push & Deploy to Kubernetes

on:
  push:
    branches:
      - main

# IMAGE_REGISTRY: GitHub Container Registry (GHCR) kullanılıyor.
# Değiştirmek istersen Docker Hub için: docker.io/KULLANICI_ADIN

env:
  IMAGE_REGISTRY: ghcr.io/sweiznn

jobs:
  # ─────────────────────────────────────────────────────────
  # AŞAMA 1: Docker imajlarını build et ve GHCR'ye push et
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Çıktı olarak tam imaj tag'ini sonraki job'a aktarıyoruz
    outputs:
      registry: ${{ env.IMAGE_REGISTRY }}


    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ DÜZELTME: Docker Hub yerine GHCR'ye login (GITHUB_TOKEN ile, secret gerekmez)
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Buildx: çok platform desteği + layer cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Spark imajı (Bronze/Silver/Gold/Training job'ları kullanır) ---
      - name: Build and push Spark image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./spark_jobs/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-spark:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Producer imajı ---
      - name: Build and push Producer image
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-producer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- MLflow imajı ---
      - name: Build and push MLflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ml_pipeline/Dockerfile.mlflow
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-mlflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Dashboard imajı ---
      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ml_pipeline/Dockerfile.dashboard
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/nyc-taxi-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # AŞAMA 2: Kubernetes'e deploy et
  # ─────────────────────────────────────────────────────────
  deploy-to-k8s:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest

    # KUBECONFIG secret'ını GitHub repo ayarlarından ekle:
    # Settings > Secrets and variables > Actions > New repository secret
    # Name: KUBECONFIG  |  Value: ~/.kube/config içeriği (base64 veya düz)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      # Manifest dosyalarındaki <your-registry> placeholder'ını gerçek registry ile değiştir
      - name: Inject image registry into manifests
        run: |
          REGISTRY="${{ env.IMAGE_REGISTRY }}"
          echo "Registry: $REGISTRY"
          find ml_pipeline/ -name "*.yml" -exec sed -i "s|sweiznn|${REGISTRY}|g" {} +

      # ── Sıralı deploy: önce altyapı, sonra servisler ──

      - name: "Deploy: Namespace"
        run: kubectl apply -f ml_pipeline/00-namespace.yml

      - name: "Deploy: PersistentVolumeClaims"
        run: kubectl apply -f ml_pipeline/01-pvc.yml

      - name: "Deploy: Spark RBAC"
        run: kubectl apply -f ml_pipeline/05-spark-rbac.yml

      - name: "Deploy: Kafka & Zookeeper"
        run: kubectl apply -f ml_pipeline/02-kafka.yml

      - name: "Deploy: MLflow"
        run: kubectl apply -f ml_pipeline/03-mlflow.yml

      - name: "Deploy: Dashboard"
        run: kubectl apply -f ml_pipeline/04-dashboard.yml

      # Stream-to-Bronze sürekli çalışır; Kafka hazır olmadan başlamaz (initContainer var)
      - name: "Deploy: Stream-to-Bronze (sürekli)"
        run: kubectl apply -f ml_pipeline/11-deployment-stream-to-bronze.yml

      # Producer Job manifesti cluster'a yüklenir ama VERİ PVC'YE YAZILMADAN çalıştırılmaz.
      # seed-data job'ı veriyi PVC'ye yazdıktan sonra producer tetiklenir.
      - name: "Apply: Producer Job manifesti"
        run: kubectl apply -f ml_pipeline/06-job-producer.yml

      - name: Deploy summary
        run: |
          echo "=== Altyapı Deploy Tamamlandı ==="
          kubectl get pods -n nyc-taxi-pipeline
          echo ""
          echo "=== Servisler ==="
          kubectl get svc -n nyc-taxi-pipeline
          echo ""
          echo "Veri yükleme (seed-data job) bir sonraki aşamada başlıyor..."

  # ─────────────────────────────────────────────────────────
  # AŞAMA 3: Veri dosyalarını PVC'ye indir ve kopyala
  # ─────────────────────────────────────────────────────────
  # Neden gerekli?
  #   • Parquet (~450MB) ve CSV GitHub'a pushlanamaz — .gitignore'da zaten hariç.
  #   • Actions runner'da TLC'nin public URL'sinden indirilip kubectl cp ile
  #     spark-data-pvc'ye (20Gi) kopyalanır.
  #   • Bu adım sadece PVC boşsa çalışır (idem-potent kontrol).
  seed-data:
    name: Seed Data into PVC
    needs: deploy-to-k8s
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      # PVC'de zaten veri var mı kontrol et (idempotent — her push'ta indirmeyi engeller)
      - name: Check if data already exists in PVC
        id: check_data
        run: |
          # Geçici bir pod başlatıp PVC'yi mount et, dosyayı ara
          EXISTS=$(kubectl run pvc-check --image=busybox:1.36 --restart=Never \
            --overrides='{
              "spec": {
                "containers": [{
                  "name": "pvc-check",
                  "image": "busybox:1.36",
                  "command": ["sh","-c","test -f /data/raw/yellow_tripdata_2023-01.parquet && echo FOUND || echo MISSING"],
                  "volumeMounts": [{"name":"data","mountPath":"/data"}]
                }],
                "volumes": [{"name":"data","persistentVolumeClaim":{"claimName":"spark-data-pvc"}}]
              }
            }' \
            -n nyc-taxi-pipeline --rm -i --wait=true 2>/dev/null || echo "MISSING")
          echo "data_status=$EXISTS" >> "$GITHUB_OUTPUT"
          echo "Veri durumu: $EXISTS"

      # Veri eksikse Actions runner'da indir
      - name: Download data files (from TLC public URLs)
        if: steps.check_data.outputs.data_status != 'FOUND'
        run: |
          mkdir -p /tmp/taxi-data/raw /tmp/taxi-data/lookup

          echo "Parquet indiriliyor (~450MB)..."
          curl -L --retry 3 --retry-delay 5 --progress-bar \
            "https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_2023-01.parquet" \
            -o /tmp/taxi-data/raw/yellow_tripdata_2023-01.parquet

          echo "Zone lookup CSV indiriliyor..."
          curl -L --retry 3 --retry-delay 5 \
            "https://d37ci6vzurychx.cloudfront.net/misc/taxi_zone_lookup.csv" \
            -o /tmp/taxi-data/lookup/taxi_zone_lookup.csv

          echo "İndirme tamamlandı:"
          ls -lh /tmp/taxi-data/raw/ /tmp/taxi-data/lookup/

      # Veriyi PVC'ye kopyala (kubectl cp ile geçici pod üzerinden)
      - name: Copy data into spark-data-pvc
        if: steps.check_data.outputs.data_status != 'FOUND'
        run: |
          NS="nyc-taxi-pipeline"

          # PVC'ye yazabilmek için geçici bir pod başlat
          kubectl run data-seeder --image=busybox:1.36 --restart=Never \
            --overrides='{
              "spec": {
                "containers": [{
                  "name": "data-seeder",
                  "image": "busybox:1.36",
                  "command": ["sh","-c","mkdir -p /data/raw /data/lookup && sleep 3600"],
                  "volumeMounts": [{"name":"data","mountPath":"/data"}]
                }],
                "volumes": [{"name":"data","persistentVolumeClaim":{"claimName":"spark-data-pvc"}}]
              }
            }' -n "$NS"

          # Pod ayağa kalkana kadar bekle
          kubectl wait --for=condition=ready pod/data-seeder -n "$NS" --timeout=60s

          # Dosyaları kopyala
          echo "Parquet PVC'ye kopyalanıyor..."
          kubectl cp /tmp/taxi-data/raw/yellow_tripdata_2023-01.parquet \
            "$NS/data-seeder:/data/raw/yellow_tripdata_2023-01.parquet"

          echo "Zone lookup PVC'ye kopyalanıyor..."
          kubectl cp /tmp/taxi-data/lookup/taxi_zone_lookup.csv \
            "$NS/data-seeder:/data/lookup/taxi_zone_lookup.csv"

          echo "Kopyalama tamamlandı:"
          kubectl exec -n "$NS" data-seeder -- ls -lh /data/raw/ /data/lookup/

          # Geçici pod'u temizle
          kubectl delete pod data-seeder -n "$NS" --ignore-not-found=true

      - name: "Trigger: Producer Job (veri PVC'de hazır)"
        if: steps.check_data.outputs.data_status != 'FOUND'
        run: |
          NS="nyc-taxi-pipeline"
          # Eski job varsa sil (yeniden çalıştırma için)
          kubectl delete job producer-job -n "$NS" --ignore-not-found=true
          # Producer'ı yeniden başlat — artık PVC'de veri var
          kubectl apply -f ml_pipeline/06-job-producer.yml 2>/dev/null || true
          echo "Producer job başlatıldı. Log için:"
          echo "  kubectl logs -f job/producer-job -n $NS"

      - name: Seed summary
        run: |
          echo "=== Pipeline Hazır ==="
          kubectl get pods -n nyc-taxi-pipeline
          echo ""
          echo "=== PVC Durumu ==="
          kubectl get pvc -n nyc-taxi-pipeline
          echo ""
          echo "Web UI erişimi:"
          echo "  MLflow:    kubectl port-forward svc/mlflow-service 5000:5000 -n nyc-taxi-pipeline"
          echo "  Dashboard: kubectl port-forward svc/dashboard-service 8501:80 -n nyc-taxi-pipeline"
