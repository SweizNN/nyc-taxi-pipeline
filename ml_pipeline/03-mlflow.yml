apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: nyc-taxi-pipeline
  labels:
    app: mlflow
    component: experiment-tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/sweiznn/nyc-taxi-mlflow:latest
        ports:
        - containerPort: 5000
          name: http
        volumeMounts:
        - name: mlflow-data
          mountPath: /mlflow_data
        # Sağlık kontrolü — pod hazır olmadan trafik almaz
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: mlflow-data
        persistentVolumeClaim:
          claimName: mlflow-pvc
---
# --- İç iletişim servisi (Spark job'ları bu servis üzerinden MLflow'a ulaşır) ---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: nyc-taxi-pipeline
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
    name: http
---
# --- Dış erişim servisi (tarayıcıdan http://localhost:30500 ile erişim) ---
# Minikube: minikube service mlflow-nodeport -n nyc-taxi-pipeline --url
# Kind/Docker Desktop: kubectl port-forward svc/mlflow-service 5000:5000 -n nyc-taxi-pipeline
apiVersion: v1
kind: Service
metadata:
  name: mlflow-nodeport
  namespace: nyc-taxi-pipeline
spec:
  type: NodePort
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
    name: http
