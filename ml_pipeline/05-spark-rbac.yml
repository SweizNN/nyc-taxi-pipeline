apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: nyc-taxi-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: nyc-taxi-pipeline
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "create", "delete", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: nyc-taxi-pipeline
subjects:
- kind: ServiceAccount
  name: spark
  namespace: nyc-taxi-pipeline
roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io
