apiVersion: batch/v1
kind: Job
metadata:
  name: producer-job
  namespace: nyc-taxi-pipeline
  labels:
    app: producer
    component: ingestion
spec:
  # Job tamamlandıktan sonra pod'u temizle (TTL: 1 saat)
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      # Kafka hazır olana kadar bekle
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Kafka'nın hazır olması bekleniyor..."
            until nc -z kafka.nyc-taxi-pipeline.svc.cluster.local 9092; do
              echo "Kafka henüz hazır değil, 5 saniye bekleniyor..."
              sleep 5
            done
            echo "Kafka hazır!"

      containers:
      - name: kafka-producer
        # CI/CD tarafından ghcr.io/sweiznn yerini IMAGE_REGISTRY alacak
        image: ghcr.io/sweiznn/nyc-taxi-producer:latest
        imagePullPolicy: Always
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.nyc-taxi-pipeline.svc.cluster.local:9092"
        - name: KAFKA_TOPIC
          value: "yellow_taxi_trips"
        # Parquet dosyası spark-data-pvc üzerinden /data dizininden okunur.
        # kubectl cp ile ya da bir initContainer ile önceden PVC'ye kopyalanmalıdır.
        - name: RAW_TAXI_PARQUET
          value: "/data/raw/yellow_tripdata_2023-01.parquet"
        - name: PRODUCER_MAX_ROWS
          value: "10000"
        - name: PRODUCER_BATCH_SIZE
          value: "500"
        - name: PRODUCER_SLEEP_SECONDS
          value: "0.2"
        - name: PRODUCER_KEY_FIELD
          value: "PULocationID"
        - name: PRODUCER_DRY_RUN
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: spark-data
          mountPath: /data

      volumes:
      - name: spark-data
        persistentVolumeClaim:
          claimName: spark-data-pvc

      restartPolicy: Never
  backoffLimit: 2

